<div class="overlay" *ngIf="open" (click)="close()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dialog-head">
      <h2>Grant Reward{{ learnerName ? ' — ' + learnerName : '' }}</h2>
      <button type="button" class="close-btn" (click)="close()">✕</button>
    </div>

    <div class="type-tabs">
      <button type="button" class="tab" [class.active]="type()==='points'" (click)="setType('points')">⚡ Points</button>
      <button type="button" class="tab" [class.active]="type()==='badge'" (click)="setType('badge')">🎖️ Badge</button>
      <button type="button" class="tab" [class.active]="type()==='credit_hours'" (click)="setType('credit_hours')">🕒 CE Hours</button>
    </div>

    <div class="field">
      <label>Title</label>
      <input type="text" [ngModel]="title()" (ngModelChange)="title.set($event)" placeholder="e.g. Outstanding participation" />
    </div>

    <div class="field" *ngIf="type()==='points'">
      <label>Points</label>
      <input type="number" min="1" [ngModel]="points()" (ngModelChange)="points.set($event)" />
    </div>

    <ng-container *ngIf="type()==='badge'">
      <div class="field">
        <label>Badge</label>
        <select [ngModel]="customBadge() ? '__custom__' : badgeKey()" (ngModelChange)="onBadgeSelectChange($event)">
          <option value="" disabled>Choose a badge…</option>
          <option *ngFor="let b of badgeCatalog" [value]="b.key">{{ b.icon }} {{ b.key }}</option>
          <option value="__custom__">✏️ Custom…</option>
        </select>
      </div>
      <div class="field" *ngIf="customBadge()">
        <label>Custom badge name</label>
        <input type="text" [ngModel]="badgeKey()" (ngModelChange)="badgeKey.set($event)" placeholder="e.g. team_player" />
      </div>
      <div class="field">
        <label>Bonus points (optional)</label>
        <input type="number" min="0" [ngModel]="points()" (ngModelChange)="points.set($event)" />
      </div>
    </ng-container>

    <ng-container *ngIf="type()==='credit_hours'">
      <div class="field">
        <label>Hours</label>
        <input type="number" min="0.5" step="0.5" [ngModel]="hours()" (ngModelChange)="hours.set($event)" />
      </div>
      <div class="field">
        <label>Unit (optional)</label>
        <input type="text" [ngModel]="creditUnit()" (ngModelChange)="creditUnit.set($event)" placeholder="e.g. CEU" />
      </div>
      <div class="field" *ngIf="licenses().length">
        <label>Apply toward license (optional)</label>
        <select [ngModel]="licenseId()" (ngModelChange)="licenseId.set($event)">
          <option value="">— No specific license —</option>
          <option *ngFor="let lic of licenses()" [value]="lic.id">{{ lic.type }} · {{ lic.number }} ({{ lic.state }})</option>
        </select>
      </div>
    </ng-container>

    <div class="field">
      <label>Note to self (optional, not shown to learner)</label>
      <textarea rows="2" [ngModel]="note()" (ngModelChange)="note.set($event)"></textarea>
    </div>

    <p class="error" *ngIf="error()">{{ error() }}</p>

    <div class="actions">
      <button type="button" class="btn ghost" (click)="close()" [disabled]="busy()">Cancel</button>
      <button type="button" class="btn primary" (click)="submit()" [disabled]="busy()">
        {{ busy() ? 'Granting…' : 'Grant Reward' }}
      </button>
    </div>
  </div>
</div>
