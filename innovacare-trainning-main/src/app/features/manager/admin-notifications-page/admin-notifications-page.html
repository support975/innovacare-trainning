<mat-card>
  <h2 style="margin:0 0 12px 0;">Admin Notifications</h2>

  <div class="grid">
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input
        matInput
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Severity</mat-label>
      <mat-select
        [ngModel]="severity()"
        (ngModelChange)="severity.set($event)"
      >
        <mat-option value="info">info</mat-option>
        <mat-option value="warning">warning</mat-option>
        <mat-option value="critical">critical</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Body</mat-label>
      <textarea
        matInput
        rows="4"
        [ngModel]="body()"
        (ngModelChange)="body.set($event)"
      ></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Link (optional)</mat-label>
      <input
        matInput
        placeholder="/learner/courses/xyz"
        [ngModel]="link()"
        (ngModelChange)="link.set($event)"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Audience Type</mat-label>
      <mat-select
        [ngModel]="audienceType()"
        (ngModelChange)="audienceType.set($event)"
      >
        <mat-option value="all">all users</mat-option>
        <mat-option value="role">by role</mat-option>
        <mat-option value="user">single user</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" *ngIf="audienceType() === 'role'">
      <mat-label>Role</mat-label>
      <mat-select
        [ngModel]="audienceRole()"
        (ngModelChange)="audienceRole.set($event)"
      >
        <mat-option value="learner">learner</mat-option>
        <mat-option value="nurse">nurse</mat-option>
        <mat-option value="staff">staff</mat-option>
        <mat-option value="admin">admin</mat-option>
        <mat-option value="manager">manager</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" *ngIf="audienceType() === 'user'">
      <mat-label>User UID</mat-label>
      <input
        matInput
        [ngModel]="audienceUid()"
        (ngModelChange)="audienceUid.set($event)"
      />
    </mat-form-field>
  </div>

  <button mat-raised-button color="primary" (click)="send()" [disabled]="busy()">
    Send
  </button>

  <div class="notice" *ngIf="notice()">{{ notice() }}</div>
</mat-card>

<mat-card style="margin-top:16px;">
  <h3 style="margin:0 0 8px 0;">Recent notifications</h3>
  <mat-divider></mat-divider>

  <mat-nav-list>
    <mat-list-item *ngFor="let n of recent()">
      <div matListItemTitle>{{ n.title }}</div>
      <div matListItemLine style="opacity:.75">{{ n.body }}</div>
    </mat-list-item>
  </mat-nav-list>
</mat-card>
